<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- Modal Header -->
            <header class="slds-modal__header">
                <lightning-button-icon 
                    icon-name="utility:close" 
                    variant="bare-inverse" 
                    size="large" 
                    alternative-text="Close" 
                    class="slds-modal__close"
                    onclick={handleClose}>
                </lightning-button-icon>
                <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">Edit Contact Information</h2>
            </header>

            <!-- Modal Body -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content">
                <div class="slds-form">
                    <lightning-input 
                        label="Name" 
                        value={editName} 
                        onchange={handleNameChange}
                        required
                        class="slds-m-bottom_small">
                    </lightning-input>

                    <lightning-input 
                        label="Email" 
                        type="email" 
                        value={editEmail} 
                        onchange={handleEmailChange}
                        required
                        class="slds-m-bottom_small">
                    </lightning-input>

                    <lightning-input 
                        label="Phone" 
                        type="tel" 
                        value={editPhone} 
                        onchange={handlePhoneChange}
                        required
                        class="slds-m-bottom_small">
                    </lightning-input>
                </div>
            </div>

            <!-- Modal Footer -->
            <footer class="slds-modal__footer">
                <lightning-button 
                    label="Cancel" 
                    onclick={handleClose}
                    class="slds-m-right_x-small">
                </lightning-button>
                <lightning-button 
                    variant="brand" 
                    label="Save" 
                    onclick={handleSave}>
                </lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
