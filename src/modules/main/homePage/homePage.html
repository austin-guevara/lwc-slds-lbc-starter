<template>
    <div class="page-container slds-p-around_large">
        <!-- Welcome Section -->
        <lightning-card class="slds-m-bottom_large">
            <div class="slds-p-around_large slds-text-align_center">
                <img src="/public/assets/recipes-logo.png" alt="Recipes Logo" class="welcome-logo slds-m-bottom_medium" />
                <h1 class="slds-text-heading_large">Welcome to the Salesforce UI Starter Kit</h1>
                <p class="slds-text-body_regular slds-m-top_medium">
                    A comprehensive starter kit for building Salesforce Lightning Web Components with SLDS.
                </p>
            </div>
        </lightning-card>

        <!-- My Pages Section -->
        <lightning-card title="My Pages" icon-name="standard:apps" class="slds-m-bottom_large">
            <div class="slds-p-horizontal_medium">
                <p class="slds-text-body_regular slds-m-bottom_large">
                    Browse all the example pages built in this application.
                </p>

                <div class="slds-grid slds-wrap slds-gutters">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Customers" icon-name="standard:account" class="slds-m-bottom_medium">
                            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                <p class="slds-text-body_small slds-m-bottom_medium">
                                    A data table displaying customer information with sorting and actions.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleCustomersClick}
                                    class="slds-m-top_small">
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Contact" icon-name="standard:contact" class="slds-m-bottom_medium">
                            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                <p class="slds-text-body_small slds-m-bottom_medium">
                                    Contact card with editable information and related activity accordions.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleContactClick}
                                    class="slds-m-top_small">
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Accordion Example" icon-name="standard:file" class="slds-m-bottom_medium">
                            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                <p class="slds-text-body_small slds-m-bottom_medium">
                                    An interactive accordion component demonstration with expandable sections.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleAccordionClick}
                                    class="slds-m-top_small">
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="User Settings Form" icon-name="standard:user" class="slds-m-bottom_medium">
                            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                                <p class="slds-text-body_small slds-m-bottom_medium">
                                    Multi-step form with validation for user settings including personal info, details, and preferences.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleUserSettingsClick}
                                    class="slds-m-top_small">
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>
                </div>
            </div>
        </lightning-card>

        <lightning-card title="Example Pages" class="slds-m-top_large">
            <div class="slds-p-around_medium">
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Explore these example pages to see various Lightning Design System components in action:
                </p>

                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="#" onclick={handleNavigateToCustomers} class="slds-text-link">
                            <span class="slds-text-heading_small">Customers Table</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Interactive data table with sorting, filtering, and detail view
                        </p>
                    </div>

                    <lightning-card title="Prompt used to build this page" icon-name="utility:prompt" class="slds-m-top_small">
                        <div class="slds-p-around_small">
                            <div class="slds-box slds-box_x-small slds-theme_shade">
                                <p class="slds-text-body_small">
                                    "Make another page called Customers Table that has a table of customers and above the table it has a card that shows the customer information. So that when a user clicks a row in the table it shows the details above.
                                </p>
                                <p class="slds-text-body_small slds-m-top_small">
                                    Add all the usual filters and sorting, and actions to the table"
                                </p>
                            </div>
                        </div>
                    </lightning-card>
                </div>

                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="#" onclick={handleNavigateToAccordion} class="slds-text-link">
                            <span class="slds-text-heading_small">Accordion Example</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Interactive accordion component with multiple sections
                        </p>
                    </div>
                </div>

                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="#" onclick={handleNavigateToUserSettings} class="slds-text-link">
                            <span class="slds-text-heading_small">User Settings Form</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Multi-step form with comprehensive validation and progress tracking
                        </p>
                    </div>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
