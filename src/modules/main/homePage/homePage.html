<template>
    <div class="page-container slds-p-around_large">
        <!-- Welcome Section -->
        <lightning-card class="slds-m-bottom_large">
            <div class="slds-p-around_medium slds-grid slds-grid_vertical-align-center slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-text-align_center">
                    <img src="/public/assets/recipes-logo.png" alt="Recipes Logo" class="welcome-logo" />
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-4 slds-p-left_medium">
                    <h1 class="slds-text-heading_large">Welcome to the Salesforce UI Starter Kit</h1>
                    <p class="slds-text-body_regular slds-m-top_small">
                        A comprehensive starter kit for building Salesforce Lightning Web Components with SLDS.
                    </p>
                </div>
            </div>
        </lightning-card>

        <!-- My Pages Section -->
        <lightning-card title="My Pages" icon-name="standard:apps" class="slds-m-bottom_large">
            <div class="slds-p-around_medium">
                <div class="slds-text-align_center slds-p-vertical_large">
                    <p class="slds-text-body_regular">
                        When you create a new page, a link to it will show up here. See the Example Pages below for tips on how to best prompt builder.
                    </p>
                </div>
            </div>
        </lightning-card>

        <!-- UI Shell Gallery Section -->
        <lightning-card title="UI Shell Gallery" icon-name="standard:canvas" class="slds-m-bottom_large">
            <div class="slds-p-around_small">
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Explore different UI Shell patterns and their use cases. When asking Builder.io to build something, you can reference these layouts. If you don't know which to use, that's ok, Builder will choose an appropriate one based on your request.
                </p>

                <!-- Foundational Shell Components -->
                <h3 class="slds-text-heading_small slds-m-bottom_x-small slds-m-top_medium">Foundational Shell Components</h3>
                <p class="slds-text-body_small slds-m-bottom_small slds-text-color_weak">
                    Core UI Shell components that provide the basic structure of Salesforce applications.
                </p>
                <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
                    <!-- Global Header -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Global Header" icon-name="utility:magicwand" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header" style="height: 30px;"></div>
                                </div>
                                <p class="slds-text-body_small">
                                    Top header with branding, global search, and user menu.
                                </p>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Global Navigation -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Global Navigation" icon-name="utility:threedots" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header" style="height: 25px; margin-bottom: 3px;"></div>
                                    <div class="preview-body"></div>
                                </div>
                                <p class="slds-text-body_small">
                                    Context bar with app switcher and navigation tabs.
                                </p>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Side Panel -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Side Panel" icon-name="utility:side_list" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-docked">
                                        <div class="preview-main-content"></div>
                                        <div class="preview-docked-panel"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small">
                                    Pinnable side panel for contextual information.
                                </p>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Docked Composer -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Docked Composer" icon-name="utility:insert_tag_field" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div style="height: 70px; background: var(--slds-g-color-surface-container-2, #f3f3f3);"></div>
                                    <div style="height: 30px; background: var(--slds-g-color-surface-container-1, #fff); border: 1px solid var(--slds-g-color-border-1, #e5e5e5); margin-top: 3px;"></div>
                                </div>
                                <p class="slds-text-body_small">
                                    Bottom docked panel for multi-tasking workflows.
                                </p>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Utility Bar -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Utility Bar" icon-name="utility:bottom_bar" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div style="height: 70px; background: var(--slds-g-color-surface-container-2, #f3f3f3);"></div>
                                    <div style="height: 28px; background: var(--slds-g-color-surface-container-1, #fff); border-top: 2px solid var(--slds-g-color-border-1, #e5e5e5); display: flex; gap: 6px; padding: 4px;">
                                        <div style="width: 60px; height: 100%; background: var(--slds-g-color-accent-1, #066afe); border-radius: 3px;"></div>
                                        <div style="width: 60px; height: 100%; background: var(--slds-g-color-surface-container-3, #e5e5e5); border-radius: 3px;"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small">
                                    Persistent toolbar for quick access to utilities.
                                </p>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Canvas / Main Content Area -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Canvas (Main Content)" icon-name="utility:canvas" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header" style="height: 12px; margin-bottom: 3px;"></div>
                                    <div class="preview-body" style="min-height: 60px;"></div>
                                </div>
                                <p class="slds-text-body_small">
                                    Main content area where page layouts render.
                                </p>
                            </div>
                        </lightning-card>
                    </div>
                </div>

                <!-- Layout Patterns - shown when expanded -->
                <template if:true={showMoreShells}>
                    <h3 class="slds-text-heading_small slds-m-bottom_x-small slds-m-top_small">Layout Patterns</h3>
                    <p class="slds-text-body_small slds-m-bottom_small slds-text-color_weak">
                        Common layout patterns for organizing content within the canvas area.
                    </p>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                    <!-- Standard Page Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Standard Page Layout" icon-name="utility:page" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header"></div>
                                    <div class="preview-body"></div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Traditional single-column layout. Best for forms, detail pages, and focused content.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="standard"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Split View Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Split View Layout" icon-name="utility:layout" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header"></div>
                                    <div class="preview-split">
                                        <div class="preview-split-left"></div>
                                        <div class="preview-split-right"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Two-column layout for displaying related content side-by-side.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="split"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Master-Detail Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Master-Detail Layout" icon-name="utility:rows" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-master-detail">
                                        <div class="preview-master"></div>
                                        <div class="preview-detail"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    List on left, details on right. Perfect for browsing collections.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="masterDetail"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                        <!-- Card Grid Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Card Grid Layout" icon-name="utility:apps" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-grid">
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Responsive grid of cards. Ideal for dashboards and catalogs.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="cardGrid"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- List View Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="List View Layout" icon-name="utility:list" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-header"></div>
                                        <div class="preview-list">
                                            <div class="preview-list-item"></div>
                                            <div class="preview-list-item"></div>
                                            <div class="preview-list-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Vertical list with filters. Great for data tables and search results.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="listView"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Docked Panel Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Docked Panel Layout" icon-name="utility:side_list" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-docked">
                                            <div class="preview-main-content"></div>
                                            <div class="preview-docked-panel"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Main content with collapsible side panel for contextual info.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="docked"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Modal Dialog Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Modal Dialog Layout" icon-name="utility:new_window" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-modal-backdrop">
                                            <div class="preview-modal"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Overlay dialog that focuses user attention.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="modal"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Tabs Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Tabs Layout" icon-name="utility:multi_select_checkbox" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-tabs">
                                            <div class="preview-tab-header"></div>
                                            <div class="preview-tab-content"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Organize related content into separate tabs.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="tabs"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Accordion Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Accordion Layout" icon-name="utility:record" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-accordion">
                                            <div class="preview-accordion-item"></div>
                                            <div class="preview-accordion-item"></div>
                                            <div class="preview-accordion-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Vertically stacked expandable sections for FAQs and timelines.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="accordion"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>
                    </div>
                </template>

                <!-- Show More / Show Less Button -->
                <div class="slds-text-align_center slds-m-top_medium">
                    <lightning-button
                        label={showMoreLabel}
                        icon-name={showMoreIcon}
                        onclick={handleToggleShells}
                        variant="neutral">
                    </lightning-button>
                </div>
            </div>
        </lightning-card>

        <lightning-card title="Example Pages" icon-name="standard:apps" class="slds-m-bottom_large">
            <div class="slds-p-around_medium">
                <p class="slds-text-body_regular slds-m-bottom_large">
                    Explore these example pages to see various Lightning Design System components in action:
                </p>

                <!-- Customers Table -->
                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="/customers" onclick={handleNavigateToCustomers} class="slds-text-link">
                            <h3 class="slds-text-heading_medium">Customers Table</h3>
                        </a>
                    </div>
                    <p class="slds-text-body_regular slds-m-bottom_small">
                        Master-detail layout showing customer list on the left and selected customer details on the right. Features searchable list, click-to-select interaction, and organized detail sections.
                    </p>
                    <div class="slds-box slds-box_x-small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Example prompt:</strong>
                        </p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            "Turn this customer table into a master detail layout. Lists the customers on the left and shows details on the right"
                        </p>
                    </div>
                </div>

                <!-- Contact Page -->
                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="/contact" onclick={handleNavigateToAccordion} class="slds-text-link">
                            <h3 class="slds-text-heading_medium">Contact</h3>
                        </a>
                    </div>
                    <p class="slds-text-body_regular slds-m-bottom_small">
                        Contact card with editable information and related activity accordions. Features inline editing, activity timeline, and expandable sections.
                    </p>
                    <div class="slds-box slds-box_x-small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Example prompt:</strong>
                        </p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            "Create a contact page with a card showing contact details that can be edited inline. Below the contact card, show related activities in an accordion layout with expandable sections for emails, calls, and meetings"
                        </p>
                    </div>
                </div>

                <!-- Accordion Example -->
                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="/accordion" onclick={handleNavigateToAccordion} class="slds-text-link">
                            <h3 class="slds-text-heading_medium">Accordion Example</h3>
                        </a>
                    </div>
                    <p class="slds-text-body_regular slds-m-bottom_small">
                        Interactive accordion component demonstration with expandable sections. Shows how to organize related content into collapsible panels.
                    </p>
                    <div class="slds-box slds-box_x-small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Example prompt:</strong>
                        </p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            "Build an accordion example page that demonstrates expandable and collapsible sections. Include multiple accordion items with different content types like text, lists, and nested content"
                        </p>
                    </div>
                </div>

                <!-- User Settings Form -->
                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="/usersettings" onclick={handleNavigateToUserSettings} class="slds-text-link">
                            <h3 class="slds-text-heading_medium">User Settings Form</h3>
                        </a>
                    </div>
                    <p class="slds-text-body_regular slds-m-bottom_small">
                        Multi-step form with comprehensive validation and progress tracking. Includes personal information, additional details, and preferences with smart phone number formatting.
                    </p>
                    <div class="slds-box slds-box_x-small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Example prompt:</strong>
                        </p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            "Create a form with inputs for user settings - full name, email, phone number, age, birthday, country picklist, profile picture, and some checkboxes.
                        </p>
                        <ul class="slds-list_dotted slds-m-top_x-small slds-m-left_large">
                            <li>Add validation to this form so that invalid values show an error on the input</li>
                            <li>Add a 'Next' button, and a progress indicator under the form that progresses to the next step and shows new inputs when 'Next' is clicked"</li>
                        </ul>
                    </div>
                </div>

                <!-- UI Shell Gallery -->
                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="/gallery" onclick={handleNavigateToGallery} class="slds-text-link">
                            <h3 class="slds-text-heading_medium">UI Shell Gallery</h3>
                        </a>
                    </div>
                    <p class="slds-text-body_regular slds-m-bottom_small">
                        Explore available UI Shell patterns and layouts with visual examples and descriptions. Interactive showcase of 9 different layout patterns with detailed explanations and use cases.
                    </p>
                    <div class="slds-box slds-box_x-small slds-theme_shade">
                        <p class="slds-text-body_small slds-text-color_weak">
                            <strong>Example prompt:</strong>
                        </p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            "Make a Gallery page that shows each UI Shell that is available and describes what it can do. Include visual previews of each layout pattern with descriptions and use cases"
                        </p>
                    </div>
                </div>
            </div>
        </lightning-card>

        <!-- Shell Details Modal -->
        <main-shell-details-modal
            is-open={isModalOpen}
            shell-data={selectedShellData}
            onclose={handleCloseModal}>
        </main-shell-details-modal>
    </div>
</template>
