<template>
    <div class="slds-p-around_large">
        <lightning-card>
            <div class="slds-p-around_large slds-text-align_center">
                <img src="/public/assets/recipes-logo.png" alt="Recipes Logo" class="slds-m-bottom_medium" />
                <h1 class="slds-text-heading_large">Welcome to the Salesforce UI Starter Kit</h1>
                <p class="slds-text-body_regular slds-m-top_medium">
                    A comprehensive starter kit for building Salesforce Lightning Web Components with SLDS.
                </p>
            </div>
        </lightning-card>

        <lightning-card title="Example Pages" class="slds-m-top_large">
            <div class="slds-p-around_medium">
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Explore these example pages to see various Lightning Design System components in action:
                </p>

                <ul class="slds-list_dotted">
                    <li class="slds-m-bottom_medium">
                        <a href="#" onclick={handleNavigateToCustomers} class="slds-text-link">
                            <strong>Customers Table</strong> - Interactive data table with sorting, filtering, and detail view
                        </a>

                        <lightning-card title="Prompt used to build this page" icon-name="utility:prompt" class="slds-m-top_small">
                            <div class="slds-p-around_small">
                                <div class="slds-box slds-box_x-small slds-theme_shade">
                                    <p class="slds-text-body_small">
                                        "Make another page called Customers Table that has a table of customers and above the table it has a card that shows the customer information. So that when a user clicks a row in the table it shows the details above.
                                    </p>
                                    <p class="slds-text-body_small slds-m-top_small">
                                        Add all the usual filters and sorting, and actions to the table"
                                    </p>
                                </div>
                            </div>
                        </lightning-card>
                    </li>
                    <li class="slds-m-bottom_small">
                        <a href="#" onclick={handleNavigateToAccordion} class="slds-text-link">
                            <strong>Accordion Example</strong> - Interactive accordion component with multiple sections
                        </a>
                    </li>
                </ul>
            </div>
        </lightning-card>
    </div>
</template>
