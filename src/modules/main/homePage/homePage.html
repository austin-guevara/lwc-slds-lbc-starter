<template>
    <div class="page-container slds-p-around_large">
        <!-- Welcome Section -->
        <lightning-card class="slds-m-bottom_large">
            <div class="slds-p-around_medium slds-grid slds-grid_vertical-align-center slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4 slds-text-align_center">
                    <img src="/public/assets/recipes-logo.png" alt="Recipes Logo" class="welcome-logo" />
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-4 slds-p-left_medium">
                    <h1 class="slds-text-heading_large">Welcome to the Salesforce UI Starter Kit</h1>
                    <p class="slds-text-body_regular slds-m-top_small">
                        A comprehensive starter kit for building Salesforce Lightning Web Components with SLDS.
                    </p>
                </div>
            </div>
        </lightning-card>

        <!-- My Pages Section -->
        <lightning-card title="My Pages" icon-name="standard:apps" class="slds-m-bottom_large">
            <div class="slds-p-around_small">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                        <lightning-card title="Customers" icon-name="standard:account" class="slds-m-bottom_small">
                            <div class="slds-p-around_small">
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    A data table displaying customer information with sorting and actions.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleCustomersClick}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                        <lightning-card title="Contact" icon-name="standard:contact" class="slds-m-bottom_small">
                            <div class="slds-p-around_small">
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Contact card with editable information and related activity accordions.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleContactClick}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                        <lightning-card title="Accordion Example" icon-name="standard:file" class="slds-m-bottom_small">
                            <div class="slds-p-around_small">
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    An interactive accordion component demonstration with expandable sections.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleAccordionClick}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                        <lightning-card title="User Settings Form" icon-name="standard:user" class="slds-m-bottom_small">
                            <div class="slds-p-around_small">
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Multi-step form with validation for user settings including personal info, details, and preferences.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleUserSettingsClick}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                        <lightning-card title="UI Shell Gallery" icon-name="standard:canvas" class="slds-m-bottom_small">
                            <div class="slds-p-around_small">
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Explore available UI Shell patterns and layouts with visual examples and descriptions.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Page"
                                    onclick={handleGalleryClick}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>
                </div>
            </div>
        </lightning-card>

        <!-- UI Shell Gallery Section -->
        <lightning-card title="UI Shell Gallery" icon-name="standard:canvas" class="slds-m-bottom_large">
            <div class="slds-p-around_small">
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Explore different UI Shell patterns and their use cases.
                </p>

                <div class="slds-grid slds-wrap slds-gutters_small">
                    <!-- Standard Page Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Standard Page Layout" icon-name="utility:page" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header"></div>
                                    <div class="preview-body"></div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Traditional single-column layout. Best for forms, detail pages, and focused content.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="standard"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Split View Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Split View Layout" icon-name="utility:layout" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-header"></div>
                                    <div class="preview-split">
                                        <div class="preview-split-left"></div>
                                        <div class="preview-split-right"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    Two-column layout for displaying related content side-by-side.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="split"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Master-Detail Layout -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                        <lightning-card title="Master-Detail Layout" icon-name="utility:rows" class="slds-m-bottom_small shell-card">
                            <div class="slds-p-around_small">
                                <div class="shell-preview slds-box slds-m-bottom_x-small">
                                    <div class="preview-master-detail">
                                        <div class="preview-master"></div>
                                        <div class="preview-detail"></div>
                                    </div>
                                </div>
                                <p class="slds-text-body_small slds-m-bottom_x-small">
                                    List on left, details on right. Perfect for browsing collections.
                                </p>
                                <lightning-button
                                    variant="brand"
                                    label="View Details"
                                    data-shell="masterDetail"
                                    onclick={handleViewShellDetails}>
                                </lightning-button>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Additional shells shown when expanded -->
                    <template if:true={showMoreShells}>
                        <!-- Card Grid Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Card Grid Layout" icon-name="utility:apps" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-grid">
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                            <div class="preview-grid-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Responsive grid of cards. Ideal for dashboards and catalogs.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="cardGrid"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- List View Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="List View Layout" icon-name="utility:list" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-header"></div>
                                        <div class="preview-list">
                                            <div class="preview-list-item"></div>
                                            <div class="preview-list-item"></div>
                                            <div class="preview-list-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Vertical list with filters. Great for data tables and search results.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="listView"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Docked Panel Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Docked Panel Layout" icon-name="utility:side_list" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-docked">
                                            <div class="preview-main-content"></div>
                                            <div class="preview-docked-panel"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Main content with collapsible side panel for contextual info.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="docked"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Modal Dialog Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Modal Dialog Layout" icon-name="utility:new_window" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-modal-backdrop">
                                            <div class="preview-modal"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Overlay dialog that focuses user attention.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="modal"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Tabs Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Tabs Layout" icon-name="utility:multi_select_checkbox" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-tabs">
                                            <div class="preview-tab-header"></div>
                                            <div class="preview-tab-content"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Organize related content into separate tabs.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="tabs"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>

                        <!-- Accordion Layout -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                            <lightning-card title="Accordion Layout" icon-name="utility:record" class="slds-m-bottom_small shell-card">
                                <div class="slds-p-around_small">
                                    <div class="shell-preview slds-box slds-m-bottom_x-small">
                                        <div class="preview-accordion">
                                            <div class="preview-accordion-item"></div>
                                            <div class="preview-accordion-item"></div>
                                            <div class="preview-accordion-item"></div>
                                        </div>
                                    </div>
                                    <p class="slds-text-body_small slds-m-bottom_x-small">
                                        Vertically stacked expandable sections for FAQs and timelines.
                                    </p>
                                    <lightning-button
                                        variant="brand"
                                        label="View Details"
                                        data-shell="accordion"
                                        onclick={handleViewShellDetails}>
                                    </lightning-button>
                                </div>
                            </lightning-card>
                        </div>
                    </template>
                </div>

                <!-- Show More / Show Less Button -->
                <div class="slds-text-align_center slds-m-top_medium">
                    <lightning-button
                        label={showMoreLabel}
                        icon-name={showMoreIcon}
                        onclick={handleToggleShells}
                        variant="neutral">
                    </lightning-button>
                </div>
            </div>
        </lightning-card>

        <lightning-card title="Example Pages" class="slds-m-top_large">
            <div class="slds-p-around_medium">
                <p class="slds-text-body_regular slds-m-bottom_medium">
                    Explore these example pages to see various Lightning Design System components in action:
                </p>

                <div class="slds-m-bottom_large">
                    <div class="slds-m-bottom_small">
                        <a href="/customers" onclick={handleNavigateToCustomers} class="slds-text-link">
                            <span class="slds-text-heading_small">Customers Table</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Interactive data table with sorting, filtering, and detail view
                        </p>
                    </div>

                    <lightning-card title="Prompt used to build this page" icon-name="utility:prompt" class="slds-m-top_small">
                        <div class="slds-p-around_small">
                            <div class="slds-box slds-box_x-small slds-theme_shade">
                                <p class="slds-text-body_small">
                                    "Make another page called Customers Table that has a table of customers and above the table it has a card that shows the customer information. So that when a user clicks a row in the table it shows the details above.
                                </p>
                                <p class="slds-text-body_small slds-m-top_small">
                                    Add all the usual filters and sorting, and actions to the table"
                                </p>
                            </div>
                        </div>
                    </lightning-card>
                </div>

                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="/accordion" onclick={handleNavigateToAccordion} class="slds-text-link">
                            <span class="slds-text-heading_small">Accordion Example</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Interactive accordion component with multiple sections
                        </p>
                    </div>
                </div>

                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="/usersettings" onclick={handleNavigateToUserSettings} class="slds-text-link">
                            <span class="slds-text-heading_small">User Settings Form</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Multi-step form with comprehensive validation and progress tracking
                        </p>
                    </div>
                </div>

                <div class="slds-m-bottom_medium">
                    <div class="slds-m-bottom_small">
                        <a href="/gallery" onclick={handleNavigateToGallery} class="slds-text-link">
                            <span class="slds-text-heading_small">UI Shell Gallery</span>
                        </a>
                        <p class="slds-text-body_regular slds-m-top_x-small">
                            Explore available UI Shell patterns and layouts with visual previews
                        </p>
                    </div>
                </div>
            </div>
        </lightning-card>

        <!-- Shell Details Modal -->
        <main-shell-details-modal
            is-open={isModalOpen}
            shell-data={selectedShellData}
            onclose={handleCloseModal}>
        </main-shell-details-modal>
    </div>
</template>
