<template>
    <div class="slds-context-bar">
        <div class="slds-context-bar__primary">
            <div
                class="slds-context-bar__item slds-context-bar__dropdown-trigger slds-dropdown-trigger slds-dropdown-trigger_click slds-no-hover">
                <div class="slds-context-bar__icon-action slds-p-left_none">
                    <lightning-button-menu icon-name="utility:apps" title="Open Menu" variant="bare" icon-size="medium">
                        <lightning-menu-item label="Salesforce UI Starter Kit" value="home" onselect={handleMenuNavigate}></lightning-menu-item>
                    </lightning-button-menu>
                </div>
                <span class="slds-context-bar__label-action slds-context-bar__app-name">
                    <span class="slds-truncate" title="Salesforce UI Starter Kit">Salesforce UI Starter Kit</span>
                </span>
            </div>
        </div>
        <nav class="slds-context-bar__secondary" role="navigation">
            <ul class="slds-grid slds-container_fluid">
                <li class={homeTabClass}>
                    <a href="#" class="slds-context-bar__label-action" title="Home" onclick={handleHomeClick}>
                        <span class="slds-assistive-text" if:true={isHomePage}>Current Page:</span>
                        <span class="slds-truncate" title="Home">Home</span>
                    </a>
                </li>
                <li class={customersTabClass}>
                    <a href="#" class="slds-context-bar__label-action" title="Customers" onclick={handleCustomersClick}>
                        <span class="slds-assistive-text" if:true={isCustomersPage}>Current Page:</span>
                        <span class="slds-truncate" title="Customers">Customers</span>
                    </a>
                </li>
                <li class={contactTabClass}>
                    <a href="#" class="slds-context-bar__label-action" title="Contact" onclick={handleContactClick}>
                        <span class="slds-assistive-text" if:true={isContactPage}>Current Page:</span>
                        <span class="slds-truncate" title="Contact">Contact</span>
                    </a>
                </li>
                <li class={accordionTabClass}>
                    <a href="#" class="slds-context-bar__label-action" title="Accordion Example" onclick={handleAccordionClick}>
                        <span class="slds-assistive-text" if:true={isAccordionPage}>Current Page:</span>
                        <span class="slds-truncate" title="Accordion Example">Accordion Example</span>
                    </a>
                </li>
                <li class={myPagesTabClass}>
                    <a href="#" class="slds-context-bar__label-action" title="My Pages" onclick={handleMyPagesClick}>
                        <span class="slds-assistive-text" if:true={isMyPagesPage}>Current Page:</span>
                        <span class="slds-truncate" title="My Pages">My Pages</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</template>
